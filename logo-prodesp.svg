<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Elemento gráfico - três círculos interconectados -->
  <g fill="#4A148C">
    <!-- Círculo inferior esquerdo -->
    <circle cx="15" cy="40" r="6"/>
    <!-- Círculo superior esquerdo -->
    <circle cx="15" cy="20" r="6"/>
    <!-- Círculo superior direito -->
    <circle cx="30" cy="15" r="6"/>
    
    <!-- Linhas de conexão -->
    <line x1="15" y1="26" x2="15" y2="34" stroke="#4A148C" stroke-width="2"/>
    <line x1="21" y1="20" x2="27" y2="17" stroke="#4A148C" stroke-width="2"/>
  </g>
  
  <!-- Texto "Prodesp" -->
  <text x="45" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#4A148C">Prodesp</text>
</svg>
